uid: qsharp.estimator.EstimatorQubitParams
name: EstimatorQubitParams
fullName: qsharp.estimator.EstimatorQubitParams
module: qsharp.estimator
summary: 'Physical qubit parameters for resource estimation.


  Specify a built-in qubit model by setting `name` to one of the

  <xref:qsharp.estimator.QubitParams> constants, or fully define a custom model by
  setting

  `instruction_set` and all relevant timing and error-rate fields.'
constructor:
  syntax: 'EstimatorQubitParams(name: str | None = None, instruction_set: str | None
    = None, one_qubit_measurement_time: str | None = None, two_qubit_joint_measurement_time:
    str | None = None, one_qubit_gate_time: str | None = None, two_qubit_gate_time:
    str | None = None, t_gate_time: str | None = None, one_qubit_measurement_error_rate:
    None | float | MeasurementErrorRate = None, two_qubit_joint_measurement_error_rate:
    None | float | MeasurementErrorRate = None, one_qubit_gate_error_rate: float |
    None = None, two_qubit_gate_error_rate: float | None = None, t_gate_error_rate:
    float | None = None, idle_error_rate: float | None = None)'
  parameters:
  - name: name
    defaultValue: None
  - name: instruction_set
    defaultValue: None
  - name: one_qubit_measurement_time
    defaultValue: None
  - name: two_qubit_joint_measurement_time
    defaultValue: None
  - name: one_qubit_gate_time
    defaultValue: None
  - name: two_qubit_gate_time
    defaultValue: None
  - name: t_gate_time
    defaultValue: None
  - name: one_qubit_measurement_error_rate
    defaultValue: None
  - name: two_qubit_joint_measurement_error_rate
    defaultValue: None
  - name: one_qubit_gate_error_rate
    defaultValue: None
  - name: two_qubit_gate_error_rate
    defaultValue: None
  - name: t_gate_error_rate
    defaultValue: None
  - name: idle_error_rate
    defaultValue: None
