uid: qsharp.estimator.EstimatorConstraints
name: EstimatorConstraints
fullName: qsharp.estimator.EstimatorConstraints
module: qsharp.estimator
summary: 'Optional runtime and resource constraints for resource estimation.


  At most one of `max_duration` or `max_physical_qubits` may be set

  simultaneously.'
constructor:
  syntax: 'EstimatorConstraints(logical_depth_factor: float | None = None, max_t_factories:
    int | None = None, max_duration: int | None = None, max_physical_qubits: int |
    None = None)'
  parameters:
  - name: logical_depth_factor
    defaultValue: None
  - name: max_t_factories
    defaultValue: None
  - name: max_duration
    defaultValue: None
  - name: max_physical_qubits
    defaultValue: None
