### YamlMime:PythonClass
uid: qsharp.interop.cirq.NeutralAtomCirqResult
name: NeutralAtomCirqResult
fullName: qsharp.interop.cirq.NeutralAtomCirqResult
module: qsharp.interop.cirq
summary: 'A `cirq.ResultDict` that also carries raw (loss-inclusive) shot data.


  The inherited `measurements` field contains only *accepted* shots - those

  where every measured qubit returned a clean `{0, 1}` outcome.  Shots in

  which one or more qubits were lost during the simulation are excluded from

  `measurements` but are preserved in `raw_shots`.


  The `raw_shots` attribute holds the full list of simulation results, one

  entry per shot, in the native simulator output format (tuple, list, or

  scalar). This includes shots that contain qubit-loss markers.


  Use <xref:qsharp.interop.cirq.NeutralAtomCirqResult.raw_measurements> to retrieve
  the full per-shot data (including

  loss markers) in the same `{key: 2D-array (shots x bits)}` format as

  `measurements`, but with Unicode string dtype so that non-binary markers

  are preserved.'
constructor:
  syntax: 'NeutralAtomCirqResult(*, params: ParamResolver, measurements: Dict[str,
    ndarray], raw_shots: List[Any], measurement_dict: Dict[str, Sequence[int]])'
  keywordOnlyParameters:
  - name: params
    isRequired: true
  - name: measurements
    isRequired: true
  - name: raw_shots
    isRequired: true
  - name: measurement_dict
    isRequired: true
methods:
- uid: qsharp.interop.cirq.NeutralAtomCirqResult.raw_measurements
  name: raw_measurements
  summary: 'Return unfiltered per-shot measurement symbols including loss markers.


    The structure mirrors `measurements`: `{key: 2D array (shots x bits)}`,

    but the array dtype is `"<U1"` (single Unicode character) so that

    non-binary markers (e.g. `"-"` for lost qubits) are preserved.


    The returned arrays should **not** be fed into Cirq tooling that

    assumes `{0, 1}` integer bit data.'
  signature: raw_measurements() -> Dict[str, Any]
attributes:
- uid: qsharp.interop.cirq.NeutralAtomCirqResult.raw_shots
  name: raw_shots
