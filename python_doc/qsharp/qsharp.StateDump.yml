### YamlMime:PythonClass
uid: qsharp.StateDump
name: StateDump
fullName: qsharp.StateDump
module: qsharp
summary: A state dump returned from the Q# interpreter.
constructor:
  syntax: 'StateDump(data: StateDumpData)'
  parameters:
  - name: data
    isRequired: true
methods:
- uid: qsharp.StateDump.as_dense_state
  name: as_dense_state
  summary: Returns the state dump as a dense list of complex amplitudes. This will
    include zero amplitudes.
  signature: as_dense_state() -> List[complex]
  return:
    description: A dense list of complex amplitudes, one per computational basis state.
    types:
    - <xref:typing.List>[<xref:complex>]
- uid: qsharp.StateDump.check_eq
  name: check_eq
  summary: 'Checks if the state dump is equal to the given state. This is not mathematical
    equality,

    as the check ignores global phase.'
  signature: 'check_eq(state: Dict[int, complex] | List[complex], tolerance: float
    = 1e-10) -> bool'
  parameters:
  - name: state
    description: 'The state to check against, provided either as a dictionary of state
      indices to complex amplitudes,

      or as a list of real amplitudes.'
    isRequired: true
  - name: tolerance
    description: The tolerance for the check. Defaults to 1e-10.
    defaultValue: '1e-10'
  return:
    description: '`True` if the state dump is equal to the given state within the
      given tolerance, ignoring global phase.'
    types:
    - <xref:bool>
attributes:
- uid: qsharp.StateDump.qubit_count
  name: qubit_count
  signature: 'qubit_count: int'
