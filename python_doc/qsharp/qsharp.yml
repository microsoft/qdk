### YamlMime:PythonPackage
uid: qsharp
name: qsharp
fullName: qsharp
type: rootImport
functions:
- uid: qsharp.circuit
  name: circuit
  summary: 'Synthesizes a circuit for a Q# program. Either an entry

    expression or an operation must be provided.


    an operation of a lambda expression. The operation must take only

    qubits or arrays of qubits as parameters.'
  signature: 'circuit(entry_expr: str | Callable | GlobalCallable | Closure | None
    = None, *args, operation: str | None = None, generation_method: CircuitGenerationMethod
    | None = None, max_operations: int | None = None, source_locations: bool = False,
    group_by_scope: bool = True, prune_classical_qubits: bool = False) -> Circuit'
  parameters:
  - name: generation_method
    description: 'The method to use for circuit generation.

      `CircuitGenerationMethod.ClassicalEval` evaluates classical control flow at
      circuit

      generation time. `CircuitGenerationMethod.Simulate` runs a full simulation to
      trace

      the circuit. `CircuitGenerationMethod.Static` uses partial evaluation and requires

      a non-`Unrestricted` target profile. Defaults to `None` (auto-selected).'
    isRequired: true
  - name: max_operations
    description: 'The maximum number of operations to include in the circuit.

      Defaults to `None` (no limit).'
    isRequired: true
  - name: source_locations
    description: 'If `True`, annotates each gate with its source location.

      Defaults to `False`.'
    isRequired: true
  - name: group_by_scope
    description: 'If `True`, groups operations by their Q# scope (e.g. operation body).

      Defaults to `True`.'
    isRequired: true
  - name: prune_classical_qubits
    description: 'If `True`, removes qubits that are never used in a quantum

      gate (e.g. qubits only used as classical controls). Defaults to `False`.'
    isRequired: true
  - name: entry_expr
    defaultValue: None
  keywordOnlyParameters:
  - name: operation
    defaultValue: None
  - name: generation_method
    defaultValue: None
  - name: max_operations
    defaultValue: None
  - name: source_locations
    defaultValue: 'False'
  - name: group_by_scope
    defaultValue: 'True'
  - name: prune_classical_qubits
    defaultValue: 'False'
  return:
    description: The synthesized circuit.
    types:
    - <xref:Circuit>
  exceptions:
  - type: qsharp.QSharpError
    description: If there is an error synthesizing the circuit.
- uid: qsharp.compile
  name: compile
  summary: 'Compiles the Q# source code into a program that can be submitted to a
    target.

    Either an entry expression or a callable with arguments must be provided.


    Example:'
  signature: 'compile(entry_expr: str | Callable | GlobalCallable | Closure, *args)
    -> QirInputData'
  parameters:
  - name: entry_expr
    description: 'The Q# expression that will be used as the entrypoint

      for the program. Alternatively, a callable can be provided, which must

      be a Q# callable.'
    isRequired: true
  - name: '*args'
    description: The arguments to pass to the callable, if one is provided.
    isRequired: true
  return:
    description: The compiled program. Use `str()` to get the QIR string.
    types:
    - <xref:QirInputData>
- uid: qsharp.dump_circuit
  name: dump_circuit
  summary: 'Dumps a circuit showing the current state of the simulator.


    This circuit will contain the gates that have been applied

    in the simulator up to the current point.


    Requires the interpreter to be initialized with *trace_circuit=True*.'
  signature: dump_circuit() -> Circuit
  return:
    description: The current circuit trace.
    types:
    - <xref:Circuit>
  exceptions:
  - type: qsharp.QSharpError
    description: If the interpreter was not initialized with `trace_circuit=True`
- uid: qsharp.dump_machine
  name: dump_machine
  summary: Returns the sparse state vector of the simulator as a StateDump object.
  signature: dump_machine() -> StateDump
  return:
    description: The state of the simulator.
    types:
    - <xref:qsharp.StateDump>
- uid: qsharp.estimate
  name: estimate
  summary: 'Estimates resources for Q# source code.

    Either an entry expression or a callable with arguments must be provided.'
  signature: 'estimate(entry_expr: str | Callable | GlobalCallable | Closure, params:
    Dict[str, Any] | List | EstimatorParams | None = None, *args) -> EstimatorResult'
  parameters:
  - name: entry_expr
    description: 'The entry expression. Alternatively, a callable can be provided,

      which must be a Q# callable.'
    isRequired: true
  - name: params
    description: The parameters to configure physical estimation.
    defaultValue: None
  return:
    description: The estimated resources.
    types:
    - <xref:qsharp.estimator.EstimatorResult>
- uid: qsharp.estimate_custom
  name: estimate_custom
  signature: estimate_custom(algorithm, qubit, qec, factories=Ellipsis, *, error_budget=0.01,
    max_factories=None, logical_depth_factor=None, max_physical_qubits=None, max_duration=None,
    error_budget_pruning=False)
  parameters:
  - name: algorithm
    isRequired: true
  - name: qubit
    isRequired: true
  - name: qec
    isRequired: true
  - name: factories
    defaultValue: Ellipsis
  keywordOnlyParameters:
  - name: error_budget
    defaultValue: '0.01'
  - name: max_factories
    defaultValue: None
  - name: logical_depth_factor
    defaultValue: None
  - name: max_physical_qubits
    defaultValue: None
  - name: max_duration
    defaultValue: None
  - name: error_budget_pruning
    defaultValue: 'False'
- uid: qsharp.eval
  name: eval
  summary: 'Evaluates Q# source code.


    Output is printed to console.'
  signature: 'eval(source: str, *, save_events: bool = False) -> Any'
  parameters:
  - name: source
    description: The Q# source code to evaluate.
    isRequired: true
  - name: save_events
    description: If true, all output will be saved and returned. If false, they will
      be printed.
    isRequired: true
  keywordOnlyParameters:
  - name: save_events
    defaultValue: 'False'
  return:
    description: The value returned by the last statement in the source code, or the
      saved output if `save_events` is true.
    types:
    - <xref:typing.Any>
  exceptions:
  - type: qsharp.QSharpError
    description: If there is an error evaluating the source code.
- uid: qsharp.init
  name: init
  summary: Initializes the Q# interpreter.
  signature: 'init(*, target_profile: TargetProfile = TargetProfile.Unrestricted,
    target_name: str | None = None, project_root: str | None = None, language_features:
    List[str] | None = None, trace_circuit: bool | None = None) -> Config'
  parameters:
  - name: target_profile
    description: 'Setting the target profile allows the Q#

      interpreter to generate programs that are compatible

      with a specific target. See :py:class: *qsharp.TargetProfile*.'
    isRequired: true
  - name: target_name
    description: 'An optional name of the target machine to use for inferring the
      compatible

      target_profile setting.'
    isRequired: true
  - name: project_root
    description: 'An optional path to a root directory with a Q# project to include.

      It must contain a qsharp.json project manifest.'
    isRequired: true
  - name: language_features
    description: 'An optional list of language feature flags to enable.

      These correspond to experimental or preview Q# language features.'
    isRequired: true
  - name: trace_circuit
    description: 'Enables tracing of circuit during execution.

      Passing *True* is required for the *dump_circuit* function to return a circuit.

      The *circuit* function is *NOT* affected by this parameter will always generate
      a circuit.'
    isRequired: true
  keywordOnlyParameters:
  - name: target_profile
    defaultValue: Unrestricted
  - name: target_name
    defaultValue: None
  - name: project_root
    defaultValue: None
  - name: language_features
    defaultValue: None
  - name: trace_circuit
    defaultValue: None
  return:
    description: The Q# interpreter configuration.
    types:
    - <xref:Config>
- uid: qsharp.logical_counts
  name: logical_counts
  summary: 'Extracts logical resource counts from Q# source code.

    Either an entry expression or a callable with arguments must be provided.'
  signature: 'logical_counts(entry_expr: str | Callable | GlobalCallable | Closure,
    *args) -> LogicalCounts'
  parameters:
  - name: entry_expr
    description: 'The entry expression. Alternatively, a callable can be provided,

      which must be a Q# callable.'
    isRequired: true
  return:
    description: Program resources in terms of logical gate counts.
    types:
    - <xref:qsharp.estimator.LogicalCounts>
- uid: qsharp.run
  name: run
  summary: 'Runs the given Q# expression for the given number of shots.

    Each shot uses an independent instance of the simulator.'
  signature: 'run(entry_expr: str | Callable | GlobalCallable | Closure, shots: int,
    *args, on_result: Callable[[ShotResult], None] | None = None, save_events: bool
    = False, noise: Tuple[float, float, float] | PauliNoise | BitFlipNoise | PhaseFlipNoise
    | DepolarizingNoise | NoiseConfig | None = None, qubit_loss: float | None = None,
    seed: int | None = None) -> List[Any]'
  parameters:
  - name: entry_expr
    description: 'The entry expression. Alternatively, a callable can be provided,

      which must be a Q# callable.'
    isRequired: true
  - name: shots
    description: The number of shots to run.
    isRequired: true
  - name: '*args'
    description: The arguments to pass to the callable, if one is provided.
    isRequired: true
  - name: on_result
    description: A callback function that will be called with each result.
    isRequired: true
  - name: save_events
    description: If true, the output of each shot will be saved. If false, they will
      be printed.
    isRequired: true
  - name: noise
    description: The noise to use in simulation.
    isRequired: true
  - name: qubit_loss
    description: The probability of qubit loss in simulation.
    isRequired: true
  - name: seed
    description: The seed to use for the random number generator in simulation, if
      any.
    isRequired: true
  keywordOnlyParameters:
  - name: on_result
    defaultValue: None
  - name: save_events
    defaultValue: 'False'
  - name: noise
    defaultValue: None
  - name: qubit_loss
    defaultValue: None
  - name: seed
    defaultValue: None
  return:
    description: A list of results or runtime errors. If `save_events` is true, a
      list of `ShotResult` is returned.
    types:
    - <xref:typing.List>[<xref:typing.Any>]
  exceptions:
  - type: qsharp.QSharpError
    description: If there is an error interpreting the input.
  - type: ValueError
    description: If the number of shots is less than 1.
- uid: qsharp.set_classical_seed
  name: set_classical_seed
  summary: 'Sets the seed for the random number generator used for standard

    library classical random number operations.

    This applies to all Q# code executed, compiled, or estimated.'
  signature: 'set_classical_seed(seed: int | None) -> None'
  parameters:
  - name: seed
    description: 'The seed to use for the classical random number generator.

      If None, the seed will be generated from entropy.'
    isRequired: true
- uid: qsharp.set_quantum_seed
  name: set_quantum_seed
  summary: 'Sets the seed for the random number generator used for quantum measurements.

    This applies to all Q# code executed, compiled, or estimated.'
  signature: 'set_quantum_seed(seed: int | None) -> None'
  parameters:
  - name: seed
    description: 'The seed to use for the quantum random number generator.

      If None, the seed will be generated from entropy.'
    isRequired: true
