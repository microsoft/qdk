### YamlMime:PythonClass
uid: qsharp.PhaseFlipNoise
name: PhaseFlipNoise
fullName: qsharp.PhaseFlipNoise
module: qsharp
summary: 'The phase flip noise to use in simulation.


  Creates a new <xref:qsharp.PhaseFlipNoise> instance.


  The phase flip channel applies a Pauli-Z error with probability `p`.'
constructor:
  syntax: 'PhaseFlipNoise(p: float)'
  parameters:
  - name: p
    description: "Probability of a phase flip (Pauli-Z) error. Must satisfy `0 \u2264\
      \ p \u2264 1`."
    isRequired: true
    types:
    - <xref:float>
