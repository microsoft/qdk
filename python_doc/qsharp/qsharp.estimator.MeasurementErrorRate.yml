### YamlMime:PythonClass
uid: qsharp.estimator.MeasurementErrorRate
name: MeasurementErrorRate
fullName: qsharp.estimator.MeasurementErrorRate
module: qsharp.estimator
summary: 'Measurement error rate specified separately for process and readout errors.


  Used as the value of `one_qubit_measurement_error_rate` or

  `two_qubit_joint_measurement_error_rate` in <xref:qsharp.estimator.EstimatorQubitParams>

  when process and readout error rates differ.'
constructor:
  syntax: 'MeasurementErrorRate(process: float, readout: float)'
  parameters:
  - name: process
    description: Error rate during the measurement process. Must be in `(0, 1)`.
    isRequired: true
  - name: readout
    description: Error rate during readout. Must be in `(0, 1)`.
    isRequired: true
attributes:
- uid: qsharp.estimator.MeasurementErrorRate.process
  name: process
  signature: 'process: float'
- uid: qsharp.estimator.MeasurementErrorRate.readout
  name: readout
  signature: 'readout: float'
