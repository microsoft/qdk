### YamlMime:PythonClass
uid: qsharp.estimator.EstimatorResult
name: EstimatorResult
fullName: qsharp.estimator.EstimatorResult
module: qsharp.estimator
summary: 'Microsoft Resource Estimator result.


  The class represents simple resource estimation results as well as batching

  resource estimation results.  The latter can be indexed by an integer index to

  access an individual result from the batching result.'
constructor:
  syntax: 'EstimatorResult(data: Dict | List)'
  parameters:
  - name: data
    isRequired: true
methods:
- uid: qsharp.estimator.EstimatorResult.data
  name: data
  summary: 'Returns raw data of the result object.


    In case of a batching job, you can pass an index to access a specific

    item.'
  signature: 'data(idx: int | None = None) -> Any'
  parameters:
  - name: idx
    defaultValue: None
attributes:
- uid: qsharp.estimator.EstimatorResult.error
  name: error
  summary: Returns the error object if the result is an error.
- uid: qsharp.estimator.EstimatorResult.json
  name: json
  summary: Returns a JSON representation of the resource estimation result data.
- uid: qsharp.estimator.EstimatorResult.logical_counts
  name: logical_counts
  summary: Returns the logical counts of the result.
- uid: qsharp.estimator.EstimatorResult.MAX_DEFAULT_ITEMS_IN_TABLE
  name: MAX_DEFAULT_ITEMS_IN_TABLE
  signature: MAX_DEFAULT_ITEMS_IN_TABLE = 5
