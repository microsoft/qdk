### YamlMime:PythonClass
uid: qsharp.DepolarizingNoise
name: DepolarizingNoise
fullName: qsharp.DepolarizingNoise
module: qsharp
summary: 'The depolarizing noise to use in simulation.


  Creates a new <xref:qsharp.DepolarizingNoise> instance.


  The depolarizing channel applies Pauli-X, Pauli-Y, or Pauli-Z errors each with

  probability `p / 3`.'
constructor:
  syntax: 'DepolarizingNoise(p: float)'
  parameters:
  - name: p
    description: "Total depolarizing error probability. Must satisfy `0 \u2264 p \u2264\
      \ 1`."
    isRequired: true
    types:
    - <xref:float>
