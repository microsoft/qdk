### YamlMime:PythonClass
uid: qsharp.PauliNoise
name: PauliNoise
fullName: qsharp.PauliNoise
module: qsharp
summary: 'The Pauli noise to use in simulation represented

  as probabilities of Pauli-X, Pauli-Y, and Pauli-Z errors


  Creates a new <xref:qsharp.PauliNoise> instance with the given error probabilities.'
constructor:
  syntax: 'PauliNoise(x: float, y: float, z: float)'
  parameters:
  - name: x
    description: Probability of a Pauli-X (bit flip) error. Must be non-negative.
    isRequired: true
    types:
    - <xref:float>
  - name: y
    description: Probability of a Pauli-Y error. Must be non-negative.
    isRequired: true
    types:
    - <xref:float>
  - name: z
    description: Probability of a Pauli-Z (phase flip) error. Must be non-negative.
    isRequired: true
    types:
    - <xref:float>
