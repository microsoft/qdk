### YamlMime:PythonClass
uid: qsharp.estimator.ErrorBudgetPartition
name: ErrorBudgetPartition
fullName: qsharp.estimator.ErrorBudgetPartition
module: qsharp.estimator
summary: 'Partition of the total error budget across algorithm components.


  The three fields must sum to the overall error budget. Defaults to equal

  thirds of `0.001` (i.e. each component gets `~3.33e-4`).'
constructor:
  syntax: 'ErrorBudgetPartition(logical: float = 0.0003333333333333333, t_states:
    float = 0.0003333333333333333, rotations: float = 0.0003333333333333333)'
  parameters:
  - name: logical
    description: Budget allocated to logical errors in the algorithm.
    defaultValue: '0.0003333333333333333'
  - name: t_states
    description: Budget allocated to T-state distillation errors.
    defaultValue: '0.0003333333333333333'
  - name: rotations
    description: Budget allocated to rotation synthesis errors.
    defaultValue: '0.0003333333333333333'
attributes:
- uid: qsharp.estimator.ErrorBudgetPartition.logical
  name: logical
  signature: 'logical: float = 0.0003333333333333333'
- uid: qsharp.estimator.ErrorBudgetPartition.rotations
  name: rotations
  signature: 'rotations: float = 0.0003333333333333333'
- uid: qsharp.estimator.ErrorBudgetPartition.t_states
  name: t_states
  signature: 't_states: float = 0.0003333333333333333'
