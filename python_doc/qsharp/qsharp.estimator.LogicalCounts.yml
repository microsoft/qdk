### YamlMime:PythonClass
uid: qsharp.estimator.LogicalCounts
name: LogicalCounts
fullName: qsharp.estimator.LogicalCounts
module: qsharp.estimator
summary: 'Microsoft Resource Estimator Logical Counts.


  The class represents logical counts that can be used as input to physical estimation
  of resources

  in the Microsoft Resource Estimator.'
constructor:
  syntax: 'LogicalCounts(data: Dict)'
  parameters:
  - name: data
    isRequired: true
methods:
- uid: qsharp.estimator.LogicalCounts.estimate
  name: estimate
  summary: 'Estimates resources for the current logical counts, using the

    Parallel Synthesis Sequential Pauli Computation (PSSPC) layout method.'
  signature: 'estimate(params: dict | List | EstimatorParams = None) -> EstimatorResult'
  parameters:
  - name: params
    description: The parameters to configure physical estimation.
    defaultValue: None
  return:
    description: The estimated resources.
    types:
    - <xref:qsharp.estimator.EstimatorResult>
attributes:
- uid: qsharp.estimator.LogicalCounts.json
  name: json
  summary: Returns a JSON representation of the logical counts.
