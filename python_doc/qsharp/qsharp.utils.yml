  signature: 'dump_operation(operation: str, num_qubits: int) -> List[List[complex]]'
  parameters:
  - name: operation
    description: The operation to be performed, which must operate on a list of qubits.
    isRequired: true
  - name: num_qubits
    description: The number of qubits to be used.
    isRequired: true
  return:
