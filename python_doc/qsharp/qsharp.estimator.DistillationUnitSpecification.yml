### YamlMime:PythonClass
uid: qsharp.estimator.DistillationUnitSpecification
name: DistillationUnitSpecification
fullName: qsharp.estimator.DistillationUnitSpecification
module: qsharp.estimator
summary: 'Specification for a magic-state distillation unit.


  Either select a built-in unit by setting `name`, or define a custom unit

  by providing `num_input_ts`, `num_output_ts`, `failure_probability_formula`,

  `output_error_rate_formula`, and optionally physical and logical qubit

  specifications.'
constructor:
  syntax: 'DistillationUnitSpecification(name: str | None = None, display_name: str
    | None = None, num_input_ts: int | None = None, num_output_ts: int | None = None,
    failure_probability_formula: str | None = None, output_error_rate_formula: str
    | None = None, physical_qubit_specification: ProtocolSpecificDistillationUnitSpecification
    | None = None, logical_qubit_specification: ProtocolSpecificDistillationUnitSpecification
    | None = None, logical_qubit_specification_first_round_override: ProtocolSpecificDistillationUnitSpecification
    | None = None)'
  parameters:
  - name: name
    defaultValue: None
  - name: display_name
    defaultValue: None
  - name: num_input_ts
    defaultValue: None
  - name: num_output_ts
    defaultValue: None
  - name: failure_probability_formula
    defaultValue: None
  - name: output_error_rate_formula
    defaultValue: None
  - name: physical_qubit_specification
    defaultValue: None
  - name: logical_qubit_specification
    defaultValue: None
  - name: logical_qubit_specification_first_round_override
    defaultValue: None
