### YamlMime:PythonModule
uid: qsharp.telemetry
name: telemetry
fullName: qsharp.telemetry
summary: 'This module sends telemetry directly to Azure Monitor using a similar mechanism
  and

  format to the Azure Monitor OpenTelemetry Python SDK. It only supports custom metrics
  of

  type "counter" and "histogram" for now. It''s goal is to be minimal in size and
  dependencies,

  and easy to read to understand exactly what data is being sent.



  To use this API, simply call `log_telemetry` with the metric name, value, and any
  other

  optional properties. The telemetry will be batched and sent at a regular intervals
  (60 sec),

  and when the process is about to exit.



  Disable qsharp Python telemetry by setting the environment variable `QSHARP_PYTHON_TELEMETRY=none`.'
functions:
- uid: qsharp.telemetry.log_telemetry
  name: log_telemetry
  summary: "Logs a custom metric with the name provided. Properties are optional and\
    \ can be used to\ncapture additional context about the metric (but should be a\
    \ relatively static set of values, as\neach unique set of properties will be sent\
    \ as a separate metric and creates a separate 'dimension'\nin the backend telemetry\
    \ store).\n\nThe type can be either 'counter' or 'histogram'. A 'counter' is a\
    \ simple value that is summed\nover time, such as how many times an event occurs,\
    \ while a 'histogram' is used to track 'quantative'\nvalues, such as the distribution\
    \ of values over time, e.g., the duration of an operation.\n\nExample usage for\
    \ a counter:\n\n   log_telemetry(\"qir_generated\", 1, properties={\"profile\"\
    : \"base\", \"qsharp.version\": \"1.9.0\"})\n\nExample usage for a histogram:\n\
    \n   log_telemetry(\"simulation_duration\", 123.45, type=\"histogram\")"
  signature: 'log_telemetry(name: str, value: float, count: int = 1, properties: Dict[str,
    Any] = {}, type: Literal[''counter'', ''histogram''] = ''counter'') -> None'
  parameters:
  - name: name
    isRequired: true
  - name: value
    isRequired: true
  - name: count
    defaultValue: '1'
  - name: properties
    defaultValue: '{}'
  - name: type
    defaultValue: counter
classes:
- qsharp.telemetry.Metric
- qsharp.telemetry.PendingMetric
