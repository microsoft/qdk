name: qdk-publish-$(BuildId)

# Run on merges to main to ensure that the latest code
# is always able to be published.
trigger:
  branches:
    include:
      - main

# Run the pipeline every day at 6:00 AM to ensure
# codeql and other governance checks are up-to-date.
schedules:
  - cron: "0 6 * * *"
    displayName: "Build for Component Governance"
    branches:
      include:
        - main
    always: true

variables:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN_VERSION: "1.95"
  # CFS requires that we have a .npmrc next to each package.json.  If we set this variable, it will
  # synthesize everything it requires during the pipeline run, leaving our external contributors
  # free to continue using the default npmjs.org registry.
  # (To learn more, search eng.ms for AZURE_ARTIFACTS_FEED.)
  #
  # Caveat: the synthesized .npmrc file doesn't seem to contain the necessary token, so we'll have to
  # use the npmAuthenticate task explicitly.
  AZURE_ARTIFACTS_FEED: https://pkgs.dev.azure.com/ms-azurequantum/AzureQuantum/_packaging/azure-quantum/npm/registry/

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

parameters:
  - name: matrix
    type: object
    default:
      - name: linux_x86_64
        poolName: "Azure-Pipelines-DevTools-GPU"
        imageName: "ubuntu-2204-qdk-gpu"
        os: linux
        arch: x86_64
        envVars:
          QDK_GPU_TESTS: "1"
      - name: linux_aarch64
        poolName: "Azure-Pipelines-DevTools-ARM64-EO"
        imageName: "azurelinux-3.0-gen2-arm64"
        os: linux
        arch: aarch64
      - name: mac_x86_64
        poolName: "Azure Pipelines"
        imageName: "macOS-latest" # MacOS-specific Py (Mac is usually quite limited).
        os: macOS
        arch: x86_64
      - name: mac_aarch64
        poolName: "AcesShared"
        os: macOS
        arch: aarch64
        envVars:
          QDK_GPU_TESTS: "1"
      - name: windows_x86_64
        poolName: "Azure-Pipelines-DevTools-GPU"
        imageName: "1es-pt-dsvm-windows-2022" # Win-specific Py + Platform-independent Py.
        os: windows
        arch: x86_64
        envVars:
          QDK_GPU_TESTS: "1"
      - name: windows_aarch64
        poolName: "Azure-Pipelines-DevTools-ARM64-EO"
        imageName: "windows-2025-gen2-arm64"
        os: windows
        arch: aarch64

# variables set by pipeline
# - BASE_IMAGE
# - BUILD_NUMBER
# - BUILD_TYPE
# - cratesIoFeedOverride
# - OwnerPersonalAlias
# - toolchainFeed

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    sdl:
      sourceAnalysisPool:
        name: "Azure-Pipelines-DevTools-EO"
        image: windows-2025
        os: windows
    stages:
      - stage: build
        displayName: Build
        jobs:
          - job: "VSCode"
            pool:
              name: "Azure-Pipelines-DevTools-EO"
              image: "ubuntu-latest"
              os: linux
            timeoutInMinutes: 90
            templateContext:
              outputs:
                - output: pipelineArtifact
                  displayName: "Upload VSCode Extension Artifact"
                  targetPath: $(System.DefaultWorkingDirectory)/target/vscode
                  artifactName: VSIX
                  condition: succeeded()
            steps:
              # common init steps
              - task: RustInstaller@1
                inputs:
                  rustVersion: ms-prod-$(RUST_TOOLCHAIN_VERSION)
                  additionalTargets: wasm32-unknown-unknown
                  cratesIoFeedOverride: $(cratesIoFeedOverride)
                  toolchainFeed: $(toolchainFeed)
                displayName: Install Rust toolchain

              - task: PipAuthenticate@1
                displayName: Pip Authenticate
                inputs:
                  artifactFeeds: "AzureQuantum/azure-quantum"

              - task: UsePythonVersion@0
                inputs:
                  versionSpec: "3.11"
                  githubToken: "$(GH_PACKAGE_READ_TOKEN)"

              - task: UseNode@1
                inputs:
                  version: "22.x"

              # See the note on AZURE_ARTIFACTS_FEED
              - task: npmAuthenticate@0
                inputs:
                  workingFile: .npmrc

              - script: |
                  python ./prereqs.py --install && python ./version.py
                displayName: Install Prereqs and set version

              # Below VS Code extension build only needs to run on one platform (Linux x86_64 for now)
              - script: |
                  npm install -g @vscode/vsce --userconfig=.npmrc
                displayName: Install Prereqs for VSCode Extension

              # build steps
              # we use xvfb-run to provide a virtual framebuffer for the VS Code tester,
              # which requires a display to run
              - script: |
                  xvfb-run -a python build.py --wasm --npm --vscode --integration-tests --no-check-prereqs
                displayName: Build VSCode Extension

              - script: |
                  vsce package --pre-release
                  mkdir -p $(System.DefaultWorkingDirectory)/target/vscode
                  mv *.vsix $(System.DefaultWorkingDirectory)/target/vscode
                condition: and(succeeded(), eq(variables['BUILD_TYPE'], 'dev'))
                displayName: Pack pre-release VSCode Extension
                workingDirectory: "$(System.DefaultWorkingDirectory)/source/vscode"

              - script: |
                  vsce package
                  mkdir -p $(System.DefaultWorkingDirectory)/target/vscode
                  mv *.vsix $(System.DefaultWorkingDirectory)/target/vscode
                condition: and(succeeded(), ne(variables['BUILD_TYPE'], 'dev'))
                displayName: Pack VSCode Extension
                workingDirectory: "$(System.DefaultWorkingDirectory)/source/vscode"

              - script: |
                  VSIX_RPATH="$(System.DefaultWorkingDirectory)/target/vscode"
                  VSIX_FNAME=`ls $VSIX_RPATH/*.vsix`
                  echo "RPATH: $VSIX_RPATH"
                  echo "FNAME: $VSIX_FNAME"

                  VSIX_FNAME_NOEXT="${VSIX_FNAME%.vsix}"
                  MANIFEST_FILE="${VSIX_FNAME_NOEXT}.manifest"
                  SIGNATURE_FILE="${VSIX_FNAME_NOEXT}.signature.p7s"

                  vsce generate-manifest -i $VSIX_FNAME -o $MANIFEST_FILE
                  cp $MANIFEST_FILE $SIGNATURE_FILE

                  echo "##vso[task.setvariable variable=VSIX_FNAME;]$VSIX_FNAME"
                  echo "##vso[task.setvariable variable=MANIFEST_FILE;]$MANIFEST_FILE"
                  echo "##vso[task.setvariable variable=SIGNATURE_FILE;]$SIGNATURE_FILE"
                displayName: Prepare VSCode Extension Manifest and Signature for Signing

              - task: SFP.build-tasks.custom-build-task-1.EsrpCodeSigning@6
                displayName: "ESRP CodeSigning"
                condition: succeeded()
                inputs:
                  ConnectedServiceName: "PME ESRP Azure Connection"
                  AppRegistrationClientId: "ced85fbc-381c-467d-958e-ee86a128e63a"
                  AppRegistrationTenantId: "975f013f-7f24-47e8-a7d3-abc4752bf346"
                  EsrpClientId: "832c049d-cd07-4c1c-bfa5-c07250d190cb"
                  UseMSIAuthentication: true
                  AuthAKVName: "quantum-esrp-kv"
                  AuthSignCertName: ESRPCert
                  FolderPath: "target/vscode"
                  Pattern: "*.signature.p7s"
                  signConfigType: inlineSignParams
                  inlineOperation: |
                    [
                      {
                        "keyCode": "CP-401405",
                        "operationSetCode": "VSCodePublisherSign",
                        "parameters" : [],
                        "toolName": "sign",
                        "toolVersion": "1.0"
                      }
                    ]
                  SessionTimeout: 90
                  MaxConcurrency: 25
                  MaxRetryAttempts: 5
                  PendingAnalysisWaitTimeoutMinutes: 5

              - script: |
                  echo "Command: vsce verify-signature --packagePath $VSIX_FNAME --manifestPath $MANIFEST_FILE --signaturePath $SIGNATURE_FILE"
                  vsce verify-signature --packagePath $VSIX_FNAME --manifestPath $MANIFEST_FILE --signaturePath $SIGNATURE_FILE
                condition: succeeded()
                displayName: Confirming signature verification before publishing

      - stage: release
        displayName: Release
        dependsOn: build
        condition: and(succeeded(), eq(variables['Build.Reason'], 'Manual'))
        jobs:
          - job: "Publish_VSIX_Package"
            pool:
              name: "Azure-Pipelines-DevTools-EO"
              image: "ubuntu-latest"
              os: linux
            templateContext:
              type: releaseJob
              isProduction: true
              inputs: # All input build artifacts must be declared here
                - input: pipelineArtifact
                  artifactName: VSIX
                  targetPath: $(System.DefaultWorkingDirectory)/target/vscode
            steps:
              # We don't want to check this in because it won't work for external contributors.
              # Unlike in the build stage, there doesn't seem to be a task that consumes AZURE_ARTIFACTS_FEED
              # and creates the compliant .npmrc files, so just make a simple one inline.
              - script: |
                  echo "registry=$(AZURE_ARTIFACTS_FEED)" > .npmrc
                  echo "always-auth=true" >> .npmrc
                displayName: Create .npmrc

              # See the note on AZURE_ARTIFACTS_FEED
              - task: npmAuthenticate@0
                inputs:
                  workingFile: .npmrc

              - script: |
                  npm install -g @vscode/vsce --userconfig=.npmrc
                displayName: Install Prereqs for VSCode Ext Publishing

              - script: |
                  VSIX_RPATH="$(System.DefaultWorkingDirectory)/target/vscode"
                  VSIX_FNAME=`ls $VSIX_RPATH/*.vsix`

                  VSIX_FNAME_NOEXT="${VSIX_FNAME%.vsix}"
                  MANIFEST_FILE="${VSIX_FNAME_NOEXT}.manifest"
                  SIGNATURE_FILE="${VSIX_FNAME_NOEXT}.signature.p7s"

                  echo "##vso[task.setvariable variable=VSIX_FNAME;]$VSIX_FNAME"
                  echo "##vso[task.setvariable variable=MANIFEST_FILE;]$MANIFEST_FILE"
                  echo "##vso[task.setvariable variable=SIGNATURE_FILE;]$SIGNATURE_FILE"
                displayName: Get VSCode Extension, Manifest, and Signature files for Publishing

              - script: |
                  echo "Command: vsce verify-signature --packagePath $VSIX_FNAME --manifestPath $MANIFEST_FILE --signaturePath $SIGNATURE_FILE"
                  vsce verify-signature --packagePath $VSIX_FNAME --manifestPath $MANIFEST_FILE --signaturePath $SIGNATURE_FILE
                condition: succeeded()
                displayName: Reconfirming signature verification before publishing
